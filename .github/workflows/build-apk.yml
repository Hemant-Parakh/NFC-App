name: Build Android APK

on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/TapDeck-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TapDeck-debug-apk
          path: artifacts/TapDeck-debug.apk
          retention-days: 90

      - name: Create / update release (main branch only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: TapDeck Latest Build
          body: |
            Latest debug build of TapDeck for Android.

            **How to install on your Pixel:**
            1. Download `TapDeck-debug.apk` below
            2. On your Pixel, open the file (allow "Install unknown apps" from your browser/file manager when prompted)
            3. Tap Install — done

            The app runs fully offline. No accounts, no server, all data is stored in localStorage on your device.
          files: artifacts/TapDeck-debug.apk
          prerelease: false
          make_latest: true
